# Instagram Content Automation
#
# 架構：GitHub = Scheduler（觸發器）| Manus = Publisher（執行器）
#
# 流程：
#   1. Cron 觸發 → main.py 讀排程 + 礦石 SSOT（mineralogy_data.json，共 31 種礦石）
#   2. 組裝 manus_task.json → commit 到 repo
#   3. GitHub Actions 透過 manus_trigger.py 喚醒 Manus Task
#   4. Manus 被喚醒後：透過 GitHub MCP 讀取 manus_task.json
#      → 從 assets/ 取 image_paths 對應的備用圖片及文案
#      → 透過 IG MCP 發布至 Instagram
#      → 回填 published_url，更新 content_schedule.json status = published
#      → 進入休眠
#
# 連接機制：GitHub 與 Manus 均透過 MCP 互通
#   - 所有 IG 發布由 Manus IG MCP 負責
#   - 不需要 IG_ACCESS_TOKEN、IG_USER_ID、OPENAI_API_KEY
#
# 觸發機制：Event-Driven Pull（事件驅動型主動拉取）
#   - GitHub Actions 是唯一觸發源，透過 manus_trigger.py 喚醒 Manus
#   - Manus 不做 Webhook 監聽，不做持續 Polling，避免 Token 浪費與系統不穩定
#   - Manus 被喚醒後：
#       1. 連接 GitHub MCP → 直接讀取最新 manus_task.json
#       2. 精準執行：根據 image_paths 從 assets/ 提取備用圖片
#       3. 透過 IG MCP 完成發布
#       4. 更新狀態 → 再次進入休眠
#
# 發布規格（全格式統一 1080×1350 px）：
#   Stories  ：逢一、三、四、五、日  20:00 HKT → 1 PNG
#   Posts    ：逢二、五            12:00 HKT → 5 PNG (Carousel)
#   Reels    ：逢一、四            18:00 HKT → 6 PNG 中間素材 → 1 MP4 (20–30s)

name: Instagram Content Scheduler

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task to run (stories / posts / reels)'
        required: true
        default: 'stories'
        type: choice
        options:
          - stories
          - posts
          - reels
  schedule:
    # All cron times are UTC (HKT = UTC+8)
    # Stories: Mon/Wed/Thu/Fri/Sun  20:00 HKT = 12:00 UTC  → DOW 0,1,3,4,5
    - cron: '0 12 * * 0,1,3,4,5'
    # Posts:   Tue/Fri              12:00 HKT = 04:00 UTC  → DOW 2,5
    - cron: '0 4 * * 2,5'
    # Reels:   Mon/Thu              18:00 HKT = 10:00 UTC  → DOW 1,4
    - cron: '0 10 * * 1,4'

concurrency:
  group: ig-scheduler-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # 需要寫入 manus_task.json 並 commit

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install --upgrade pip requests

      # ─── 解析今日應執行的任務類型 ───────────────────────────────
      - name: Determine Task Type
        id: task
        run: |
          TASK="${{ github.event.inputs.task_type }}"
          if [ -z "$TASK" ]; then
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
            # Stories: 12 UTC (20:00 HKT)  Mon/Wed/Thu/Fri/Sun = 1,3,4,5,7
            if   [ "$HOUR" = "12" ] && [[ "$DOW" =~ ^(1|3|4|5|7)$ ]]; then TASK="stories"
            # Posts:   04 UTC (12:00 HKT)  Tue/Fri = 2,5
            elif [ "$HOUR" = "04" ] && [[ "$DOW" =~ ^(2|5)$ ]];        then TASK="posts"
            # Reels:   10 UTC (18:00 HKT)  Mon/Thu = 1,4
            elif [ "$HOUR" = "10" ] && [[ "$DOW" =~ ^(1|4)$ ]];        then TASK="reels"
            fi
          fi
          echo "task_type=${TASK}" >> $GITHUB_OUTPUT
          echo "Resolved task type: ${TASK:-'(none — skipping)'}"

      # ─── 組裝 manus_task.json ────────────────────────────────────
      # main.py 讀取 mineralogy_data.json（SSOT，31 種礦石）及 content_schedule.json
      - name: Build Manus Task
        if: steps.task.outputs.task_type != ''
        env:
          TASK_TYPE: ${{ steps.task.outputs.task_type }}
        run: python main.py

      # ─── 將 manus_task.json commit 回 repo ─────────────────────
      # Manus 透過 GitHub MCP 讀取此檔案，無需額外授權
      - name: Commit Manus Task
        if: steps.task.outputs.task_type != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manus_task.json
          git diff --cached --quiet || git commit -m "task: [${{ steps.task.outputs.task_type }}] $(date -u +%Y-%m-%d) — awaiting Manus publish"
          git push

      # ─── 主動喚醒 Manus（Event-Driven Pull）─────────────────────
      # GitHub Actions 是唯一觸發源：
      #   1. manus_trigger.py 呼叫 Manus API，主動喚醒 Manus Task
      #   2. Manus 被喚醒後：
      #      - 透過 GitHub MCP 讀取最新 manus_task.json
      #      - 根據 image_paths 從 assets/ 提取備用圖片
      #      - 透過 IG MCP 完成發布
      #      - 更新狀態 → 再次進入休眠
      # 無 Webhook 監聽，無持續 Polling，不浪費 Token
      - name: Trigger Manus Task (Event-Driven Pull)
        if: steps.task.outputs.task_type != ''
        env:
          TASK_TYPE: ${{ steps.task.outputs.task_type }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
        run: python manus_trigger.py

      - name: Task Ready Notice
        if: steps.task.outputs.task_type != ''
        run: |
          echo "✅ manus_task.json committed to repo."
          echo "✅ Manus triggered via Event-Driven Pull."
          echo "📌 Manus flow: GitHub MCP → read manus_task.json → fetch assets/ image_paths → IG MCP publish → sleep"
          echo "📌 After publish: Manus updates content_schedule.json status = published"
          echo "📌 Dimensions: 1080x1350 px (all formats: Stories / Posts / Reels)"

      - name: Skip Notice
        if: steps.task.outputs.task_type == ''
        run: echo "ℹ️  No task scheduled for this cron slot — skipping."
