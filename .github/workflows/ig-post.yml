# Instagram Content Automation
#
# 架構：GitHub = Scheduler（觸發器）| Manus = Publisher（執行器）
#
# 連接機制：GitHub 與 Manus 均透過 MCP（Model Context Protocol）互通
#   - Manus 透過 GitHub MCP 直接讀取 repo 中的 manus_task.json
#   - 所有 IG 發布由 Manus IG MCP 負責
#   - 不需要任何 GitHub Secrets（無 MANUS_API_KEY、IG_ACCESS_TOKEN、IG_USER_ID、OPENAI_API_KEY）
#
# 流程：
#   1. Manus 在指定時間透過 GitHub MCP 呼叫 workflow_dispatch（帶 task_type input）
#   2. main.py 讀排程 + 礦石 SSOT（mineralogy_data.json，共 33 種礦石）
#   3. 組裝 manus_task.json → commit 到 repo
#   4. Manus 透過 GitHub MCP 偵測到新 commit → 主動讀取 manus_task.json
#   5. Manus 被觸發後：
#      → 從 assets/ 取 image_paths 對應的備用圖片及文案
#      → 透過 IG MCP 發布至 Instagram
#      → 回填 published_url，更新 content_schedule.json status = published
#      → 進入休眠
#
# 觸發機制：由 Manus 在指定時間透過 GitHub MCP 呼叫 workflow_dispatch
#   - 排程由 Manus 掌控（非 GitHub cron）
#   - task_type 一律由 workflow_dispatch input 提供
#   - 避免 Token 浪費與系統不穩定
#
# 發布規格（全格式統一 1080×1350 px，發布時間統一 16:00 HKT）：
#   Stories  ：1 PNG
#   Posts    ：5 PNG (Carousel)
#   Reels    ：6 PNG 中間素材 → 1 MP4 (20–30s)

name: Instagram Content Scheduler

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task to run (stories / posts / reels)'
        required: true
        default: 'stories'
        type: choice
        options:
          - stories
          - posts
          - reels

concurrency:
  group: ig-scheduler-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # 需要寫入 manus_task.json 並 commit

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # main.py 只使用 Python 標準庫（os / json / datetime / sys），無需安裝任何套件

      # ─── 解析今日應執行的任務類型 ───────────────────────────────
      - name: Determine Task Type
        id: task
        run: |
          TASK="${{ github.event.inputs.task_type }}"
          echo "task_type=${TASK}" >> $GITHUB_OUTPUT
          echo "Resolved task type: ${TASK}"

      # ─── 組裝 manus_task.json ────────────────────────────────────
      # main.py 讀取 mineralogy_data.json（SSOT，33 種礦石）及 content_schedule.json
      - name: Build Manus Task
        if: steps.task.outputs.task_type != ''
        env:
          TASK_TYPE: ${{ steps.task.outputs.task_type }}
        run: python main.py

      # ─── 將 manus_task.json commit 回 repo ─────────────────────
      # Manus 透過 GitHub MCP 讀取此檔案，無需任何 Secret 或 API Key
      - name: Commit Manus Task
        if: steps.task.outputs.task_type != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manus_task.json
          git diff --cached --quiet || git commit -m "task: [${{ steps.task.outputs.task_type }}] $(date -u +%Y-%m-%d) — awaiting Manus publish via GitHub MCP"
          git push

      - name: Task Ready Notice
        if: steps.task.outputs.task_type != ''
        run: |
          echo "✅ manus_task.json committed to repo."
          echo "📌 Manus will detect via GitHub MCP → read manus_task.json → fetch assets/ image_paths → IG MCP publish → sleep"
          echo "📌 Connection: GitHub MCP (read/write repo) + IG MCP (publish Instagram)"
          echo "📌 No API keys required — all via MCP"
          echo "📌 After publish: Manus updates content_schedule.json status = published"
          echo "📌 Dimensions: 1080x1350 px (all formats: Stories / Posts / Reels)"

      - name: Skip Notice
        if: steps.task.outputs.task_type == ''
        run: echo "ℹ️  No task scheduled for this cron slot — skipping."
