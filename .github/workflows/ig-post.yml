name: Instagram Content Automation

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task to run (stories/posts/reels)'
        required: true
        default: 'stories'
        type: choice
        options:
          - stories
          - posts
          - reels
  schedule:
    # 所有時間為 UTC（HKT = UTC+8）
    # Stories：週一、三、四、五、日  20:00 HKT = 12:00 UTC
    - cron: '0 12 * * 0,1,3,4,5'
    # Posts：週二、五  12:00 HKT = 04:00 UTC
    - cron: '0 4 * * 2,5'
    # Reels：週一、四  18:00 HKT = 10:00 UTC
    - cron: '0 10 * * 1,4'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      # ── 判斷本次觸發應執行哪種任務 ──────────────────────────
      - name: Determine Task Type
        id: task
        run: |
          TASK="${{ github.event.inputs.task_type }}"
          if [ -z "$TASK" ]; then
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
            if   [ "$HOUR" = "12" ] && [[ "$DOW" =~ ^(1|3|4|5|7)$ ]]; then TASK="stories"
            elif [ "$HOUR" = "04" ] && [[ "$DOW" =~ ^(2|5)$ ]];       then TASK="posts"
            elif [ "$HOUR" = "10" ] && [[ "$DOW" =~ ^(1|4)$ ]];       then TASK="reels"
            fi
          fi
          echo "task_type=$TASK" >> $GITHUB_OUTPUT
          echo "Resolved task: $TASK"

      # ── 讀取排程並發佈（不呼叫任何 AI API）─────────────────
      - name: Publish to Instagram
        if: steps.task.outputs.task_type != ''
        env:
          TASK_TYPE:          ${{ steps.task.outputs.task_type }}
          META_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
        run: python main.py

      - name: Skip Notice
        if: steps.task.outputs.task_type == ''
        run: echo "No task scheduled for this cron slot. Skipping."
