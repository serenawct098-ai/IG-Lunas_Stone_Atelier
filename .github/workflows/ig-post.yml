name: Instagram Content Automation



on:

  workflow_dispatch:
  
    inputs:
    
      task_type:
      
        description: 'Task to run (stories, posts, reels)'
        
        required: true
        
        default: 'stories'
        
        type: choice
        
        options:
        
          - stories
          
          - posts
          
          - reels
          
  schedule:
  
    - cron: '0 12 * * *' # Stories: Daily 20:00 HKT
    
    - cron: '0 10 * * 2,5' # Posts: Tue, Fri 18:00 HKT
    
    - cron: '0 10 * * 1,4' # Reels: Mon, Thu 18:00 HKT
    


jobs:

  publish:
  
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Checkout Repository
      
        uses: actions/checkout@v4
        


      - name: Execute Instagram Post
      
        run: |
        
          # Determine task based on schedule or input
          
          TASK="${{ github.event.inputs.task_type }}"
          
          if [ -z "$TASK" ]; then
          
            HOUR=$(date +%H)
            
            DAY=$(date +%u)
            
            if [ "$HOUR" == "12" ]; then TASK="stories";
            
            elif [ "$HOUR" == "10" ]; then
            
              if [[ "$DAY" == "2" || "$DAY" == "5" ]]; then TASK="posts";
              
              elif [[ "$DAY" == "1" || "$DAY" == "4" ]]; then TASK="reels";
              
              fi
              
            fi
            
          fi
          

          
          echo "Executing $TASK..."
          
          # Note: Actual execution requires Manus agent integration or API calls.
          
          # This workflow serves as the central trigger and SOP repository.
          
          # Success notification will be sent back to the Manus session.
          
concurrency: 








































